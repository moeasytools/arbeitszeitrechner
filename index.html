// Kalender anzeigen

let kalenderHTML="";


for(let jahr in feiertageHamburg){

kalenderHTML += `<h3>${jahr}</h3>`;
kalenderHTML += "<ul>";

feiertageHamburg[jahr].forEach(tag=>{

kalenderHTML+="</ul>";

// ===============================
// URLAUBSBERECHNUNG
// ===============================



function istFeiertag(datum){

let iso=datum.toISOString().split("T")[0];


let alle=[];


Object.values(feiertageHamburg).forEach(jahr=>{

jahr.forEach(f=>{

let teile=f[0].split(".");

alle.push(
`${teile[2]}-${teile[1]}-${teile[0]}`
);

});

});


return alle.includes(iso);

}





function istArbeitstag(datum){

let tag=datum.getDay();


if(tag===0 || tag===6){

return false;

}


if(istFeiertag(datum)){

return false;

}


return true;

}





function urlaubBerechnen(){


let start=document.getElementById("urlaubStart").value;

let tage=parseInt(
document.getElementById("urlaubTage").value
);



if(!start){

alert("Bitte Urlaubsbeginn auswählen");

return;

}



let datum=new Date(start);

let verbraucht=0;


while(verbraucht < tage){


if(istArbeitstag(datum)){

verbraucht++;

}


if(verbraucht < tage){

datum.setDate(
datum.getDate()+1
);

}


}



let ende=datum.toLocaleDateString("de-DE");



let startAnzeige=
new Date(start)
.toLocaleDateString("de-DE");



let kalendertage=Math.ceil(
(datum-new Date(start))
/(1000*60*60*24)
)+1;



document.getElementById("urlaubErgebnis").innerHTML=

`
<b>Urlaubsbeginn:</b> ${startAnzeige}<br>
<b>Urlaubstage:</b> ${tage}<br>
<b>Letzter freier Tag:</b> ${ende}<br>
<b>Gesamte freie Kalendertage:</b> ${kalendertage}
`;

}

function arbeitszeitAnpassen(){

let woche=document.getElementById("woche1").value;

let select=document.getElementById("arbeitszeit1");


if(woche=="30"){

select.innerHTML=`
<option value="299.4">4,99 Stunden</option>
<option value="374.4">6,24 Stunden</option>
`;

}

else if(woche=="35"){

select.innerHTML=`
<option value="299.4">4,99 Stunden</option>
<option value="374.4">6,24 Stunden</option>
<option value="420">7 Stunden</option>
`;

}

else if(woche=="37.5"){

select.innerHTML=`
<option value="299.4">4,99 Stunden</option>
<option value="374.4">6,24 Stunden</option>
<option value="450" selected>7,5 Stunden</option>
`;

}

else if(woche=="40"){

select.innerHTML=`
<option value="299.4">4,99 Stunden</option>
<option value="374.4">6,24 Stunden</option>
<option value="480" selected>8 Stunden</option>
`;

}

}



function zeitInMinuten(zeit){

let teile = zeit.split(":");

return parseInt(teile[0])*60 + parseInt(teile[1]);

}



function formatZeit(minuten){

minuten=((minuten%1440)+1440)%1440;

let stunden=Math.floor(minuten/60);

let minutenTeil=Math.round(minuten%60);


return String(stunden).padStart(2,"0")+":"+String(minutenTeil).padStart(2,"0");

}



function pauseBerechnen(arbeit){

if(arbeit<=299.4){
    return 0;
}

if(arbeit<=374.4){
    return 30;
}

return 45;

}



function formatArbeitszeit(minuten){

let stunden=minuten/60;

if(stunden===7.5){
    return "7,5";
}

if(stunden===8){
    return "8";
}

if(stunden===7){
    return "7";
}

if(Math.abs(stunden-6.24)<0.01){
    return "6,24";
}

return stunden.toFixed(2).replace(".",",");

}



function berechneEnde(){

let start=document.getElementById("eingang1").value;


if(!start){

alert("Bitte Arbeitsbeginn eingeben.");

return;

}


let arbeit=parseFloat(document.getElementById("arbeitszeit1").value);


// pausa automática
let pause=pauseBerechnen(arbeit);


// pausa adicional del usuario
let pausaExtra=parseInt(document.getElementById("pausaExtra").value) || 0;


// pausa total
let pausaTotal=pause + pausaExtra;


// cálculo de salida
let ende=zeitInMinuten(start)+arbeit+pausaTotal;


let woche=document.getElementById("woche1").value.replace(".",",");



document.getElementById("ergebnisEnde").innerHTML=

`
<b>Arbeitszeit:</b> ${formatArbeitszeit(arbeit)} Stunden<br>
<b>Wochenarbeitszeit:</b> ${woche} Stunden/Woche<br>
<b>Reguläre Pause:</b> ${pause} Minuten<br>
<b>Zusätzliche Pause:</b> ${pausaExtra} Minuten<br>
<b>Gesamte Pause:</b> ${pausaTotal} Minuten<br>
<b>Feierabend:</b> ${formatZeit(ende)}
`;

}
// Festivos oficiales de Hamburgo 2026-2029
const festivosHamburgo = [

"2026-01-01","2026-04-03","2026-04-06",
"2026-05-01","2026-05-14","2026-05-25",
"2026-10-03","2026-10-31",
"2026-12-25","2026-12-26",

"2027-01-01","2027-03-26","2027-03-29",
"2027-05-01","2027-05-06","2027-05-17",
"2027-10-03","2027-10-31",
"2027-12-25","2027-12-26",

"2028-01-01","2028-04-14","2028-04-17",

"2029-10-03","2029-10-31",
"2029-12-25","2029-12-26"

function esFestivo(fecha){

    let formato = fecha.toISOString().split("T")[0];

    return festivosHamburgo.includes(formato);

}



function esDiaLaborable(fecha){

    let dia = fecha.getDay();

    // 0 domingo, 6 sábado

    if(dia===0 || dia===6){
        return false;
    }

    if(esFestivo(fecha)){
        return false;
    }

    return true;

}



function calcularVacaciones(){

    let inicio = document.getElementById("inicioVacaciones").value;
    let dias = parseInt(document.getElementById("diasVacaciones").value);


    if(!inicio || !dias){

        alert("Introduce fecha y días de vacaciones");
        return;

    }


    let fecha = new Date(inicio);

    let usados = 0;


    while(usados < dias){

        if(esDiaLaborable(fecha)){

            usados++;

        }


        if(usados < dias){

            fecha.setDate(fecha.getDate()+1);

        }

    }


    let final = fecha.toLocaleDateString("de-DE");


    let totalDias = Math.ceil(
        (fecha - new Date(inicio)) / (1000*60*60*24)
    ) + 1;



    document.getElementById("resultadoVacaciones").innerHTML =

    `
    <b>Días de vacaciones solicitados:</b> ${dias}<br>
    <b>Primer día:</b> ${new Date(inicio).toLocaleDateString("de-DE")}<br>
    <b>Último día libre:</b> ${final}<br>
    <b>Total días naturales libres:</b> ${totalDias}
    `;

}
